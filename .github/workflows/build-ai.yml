name: Build AI Oracle Contract

on:
  push:
    paths:
      - 'near-ai-oracle/**'
      - '.github/workflows/build-ai.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install near-cli-go (from our fork)
        run: |
          git clone -b fix/critical-bugs https://github.com/joomcwegv/near-cli-go.git
          cd near-cli-go
          chmod +x setup.sh
          ./setup.sh
          go build -o near-go .
          mkdir -p $HOME/.near-go
          cp near-go $HOME/.near-go/
          cp setup.sh $HOME/.near-go/
          echo "$HOME/.near-go" >> $GITHUB_PATH
          echo "$HOME/.near-go/tinygo/bin" >> $GITHUB_PATH

      - name: Build AI Oracle Contract
        run: |
          cd near-ai-oracle
          go mod tidy
          near-go build project
          echo "Build finished! Directory contents:"
          ls -la

      - name: Upload WASM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-oracle-wasm
          path: near-ai-oracle/main.wasm
          if-no-files-found: error
